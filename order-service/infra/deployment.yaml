apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-svc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-svc
  template:
    metadata:
      labels:
        app: order-svc
    spec:
      containers:
        - name: order-svc
          image: thecodealchemist/order-svc:1.1-SNAPSHOT
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: order-svc-config
            - secretRef:
                name: order-svc-secret